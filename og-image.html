<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px; height: 630px;
    background: #0a0a0a;
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px;
    position: relative; overflow: hidden;
}
.red-square { width: 20px; height: 20px; background: #dc2626; position: absolute; top: 60px; left: 80px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; color: #525252; position: absolute; top: 64px; left: 112px; }
h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 72px; color: #fafafa; line-height: 1.05; margin-bottom: 24px; }
h1 em { font-style: italic; }
p { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #737373; letter-spacing: 0.02em; }
.stats { display: flex; gap: 48px; position: absolute; bottom: 80px; left: 80px; }
.stat-num { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; color: #fafafa; }
.stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #525252; margin-top: 4px; }
.border-line { position: absolute; bottom: 160px; left: 80px; right: 80px; height: 1px; background: #1a1a1a; }
</style>
</head>
<body>
<div class="red-square"></div>
<div class="label">GATEKEEPER</div>
<h1>You agreed to<br><em>all of this.</em></h1>
<p>30 services scored · Real clauses · Real grades</p>
<div class="border-line"></div>
<div class="stats">
    <div><div class="stat-num">73%</div><div class="stat-label">Share your data</div></div>
    <div><div class="stat-num">87%</div><div class="stat-label">Force arbitration</div></div>
    <div><div class="stat-num">83%</div><div class="stat-label">AI training</div></div>
    <div><div class="stat-num">93%</div><div class="stat-label">Retain after delete</div></div>
</div>
</body>
</html>
